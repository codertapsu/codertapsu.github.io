<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found — Khanh Hoang (Marcus)</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#0d1117" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#fbfbfa" media="(prefers-color-scheme: light)">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&family=Space+Grotesk:wght@600;700&display=swap">
  <link rel="stylesheet" href="/assets/css/style.css">
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        var theme = stored || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { }
    })();
  </script>
  <style>
    .nf {
      min-height: 100vh;
      display: grid;
      place-content: center;
      text-align: center;
      gap: 0.5rem;
      padding: 2rem;
    }
    .nf__code {
      font-family: var(--font-mono);
      color: var(--accent);
      letter-spacing: 0.1em;
    }
    .nf__title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(2rem, 1.4rem + 3vw, 3rem);
    }
    .nf__text {
      color: var(--text-muted);
      max-width: 42ch;
      margin: 0 auto 1rem;
    }
  </style>
</head>

<body>
  <main class="nf">
    <p class="nf__code">404</p>
    <h1 class="nf__title">Page not found</h1>
    <p class="nf__text">The page you're looking for doesn't exist or has moved.</p>
    <p><a class="btn btn--primary" href="/">Back to home</a></p>
  </main>
</body>

</html>
